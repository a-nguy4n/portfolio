<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Page</title>
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/animations/ambient-background/ambient-background.css">
    <link rel="stylesheet" href="/pages/splash/splash.css">
</head>
<body data-page="splash-page">
    <div class="ambient-background splash">
        <span data-svg data-src="/assets/images/clouds/cloud-two.svg" class="cloud cloud-medium move-right"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-seven.svg" class="cloud cloud-medium move-left"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-eight.svg" class="cloud cloud-small move-right"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-nine.svg" class="cloud cloud-large move-right"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-one.svg" class="cloud cloud-small move-left"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-thirteen.svg" class="cloud cloud-medium move-left"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-twelve.svg" class="cloud cloud-medium move-left"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-five.svg" class="cloud cloud-medium move-left"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-seven.svg" class="cloud cloud-large move-right"></span>
        <span data-svg data-src="/assets/images/clouds/cloud-ten.svg" class="cloud cloud-medium move-right"></span>

        <span data-svg data-src="/assets/images/icons/for-components/sunrise-icon.svg" class="splash-time-icon sunrise-icon" id="splash-sunrise"></span>
        <span data-svg data-src="/assets/images/icons/for-components/sun-icon.svg" class="splash-time-icon sun-icon" id="splash-sun"></span>
        <span data-svg data-src="/assets/images/icons/for-components/sunset-icon.svg" class="splash-time-icon sunset-icon" id="splash-sunset"></span>
        <span data-svg data-src="/assets/images/icons/for-components/moon-icon.svg" class="splash-time-icon moon-icon" id="splash-moon"></span>
    </div>

    <section class="typewriter-searchbar">
            <img src="/assets/images/icons/magnifying-glass.png" alt="Search Icon">

            <p id="typewriter-placeholder"> What would you like to discover?</p>
            <h1 id="typewriter-search"> Allison Nguyen's Portfolio (designed & coded-line-by-line)</h1>
    </section>

    <script type="module" src="/scripts/init.js"></script>
</body>
</html>
